name: test on windows

on:
  push:
    branches: [ master, develop, 'feature/**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: x64-debug
            vcvars_arch: x64
          - os: windows-latest
            preset: x64-release
            vcvars_arch: x64
          - os: windows-11-arm
            preset: arm64-debug
            vcvars_arch: arm64
          - os: windows-11-arm
            preset: arm64-release
            vcvars_arch: arm64

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Configure CMake
      shell: pwsh
      env:
        CMAKE_PRESET: ${{ matrix.preset }}
        VCVARS_ARCH: ${{ matrix.vcvars_arch }}
      run: |
        $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
        $vsInstallDir = & $vswhere -latest -products * -property installationPath
        if (-not $vsInstallDir) { throw 'Visual Studio installation not found.' }
        $vcvarsall = Join-Path $vsInstallDir 'VC\Auxiliary\Build\vcvarsall.bat'
        & cmd.exe /d /s /c "call `"$vcvarsall`" $env:VCVARS_ARCH && where cl && cmake --preset $env:CMAKE_PRESET"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Build
      shell: pwsh
      env:
        CMAKE_PRESET: ${{ matrix.preset }}
        VCVARS_ARCH: ${{ matrix.vcvars_arch }}
      run: |
        $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
        $vsInstallDir = & $vswhere -latest -products * -property installationPath
        if (-not $vsInstallDir) { throw 'Visual Studio installation not found.' }
        $vcvarsall = Join-Path $vsInstallDir 'VC\Auxiliary\Build\vcvarsall.bat'
        & cmd.exe /d /s /c "call `"$vcvarsall`" $env:VCVARS_ARCH && where cl && cmake --build --preset $env:CMAKE_PRESET"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Test
      run: ctest --preset ${{ matrix.preset }}
